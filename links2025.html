<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Links 2025</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: black;
      color: #00ffcc;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      color: #ff0066;
      margin-top: 20px;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 60px;
      
    }
    .links a {
      display: inline-block;
      padding: 10px 15px;
      background-color: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 5px;
      transition: transform 0.2s;
    }
    .links a:hover {
      transform: scale(1.2);
      background-color: #ff0066;
      color: white;
    }
    footer {
      background-color: #111;
      color: #ffcc00;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <h1>🎮 Links 2025 🎮</h1>

  <div class="links">
    <a href="https://enzo2628aldavis.github.io/hub/">Principal</a>
    <a href="https://enzo2628aldavis.github.io/meu-site/">Loja Ebook</a>
    <a href="https://enzo2628aldavis.github.io/brasileiraoo/index.html">Brasileirão Serie B 2025</a>
    <a href="https://enzo2628aldavis.github.io/estado/">Estados</a>
    <a href="https://enzo2628aldavis.github.io/logistica/">Logistica</a>
    <a href="https://enzo2628aldavis.github.io/pizzaria/">Pizzaria</a>
    <a href="https://enzo2628aldavis.github.io/cafeteria/">Cafeteria</a>
    <a href="https://7decormoveislp.com.br/"> Landing Page</a>
   
  </div>

  <footer>
    <p>© 2026 - Portfólio Arcade | Página Links 2025</p>
    <p><a href="index.html" style="color:#00ffcc; text-decoration:none;">Voltar ao início</a></p>
  </footer>

  <audio id="clickSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

  <script>
    const sound = document.getElementById("clickSound");
    document.querySelectorAll(".links a").forEach(link => {
      link.addEventListener("click", () => {
        sound.currentTime = 0;
        sound.play();
      });
    });
  </script>
</body>
</html>
